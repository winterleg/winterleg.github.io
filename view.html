<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Winter - View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Zen+Maru+Gothic&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Courier Prime", "Zen Maru Gothic", monospace;

        background-color: #f5f5f5;
        color: #333333;
      }

      a {
        color: #4a7a9e;
      }

      .content {
        max-width: 120ch;
        margin: auto;
        padding: 2em;
      }

      pre {
        white-space: pre;
        background: #e8e8e8;
        padding: 1em;
        border-radius: 4px;
        overflow-x: auto;
      }

      @media (prefers-color-scheme: dark) {
        * {
          background-color: #141415;
          color: #cdcdcd;
        }

        a {
          color: #6e94b2;
        }

        pre {
          background: #14141a;
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <a id="back-link">← Back</a>
      <pre id="content">Loading...</pre>
    </div>
    <script>
      document.getElementById('back-link').href = window.location.pathname.replace(/view\.html$/, 'index.html');

      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');

      if (file) {
        fetch(file)
          .then(r => r.text())
          .then(text => {
            document.getElementById('content').textContent = text;
          })
          .catch(e => {
            document.getElementById('content').textContent = 'Error loading file: ' + e;
          });
      } else {
        document.getElementById('content').textContent = 'No file specified';
      }
    </script>
  </body>
</html>
